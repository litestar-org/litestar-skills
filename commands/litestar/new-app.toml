‚îú‚îÄ‚îÄ Makefile                    # Canonical targets
‚îî‚îÄ‚îÄ README.md
```

## Apply canonical patterns

Follow these from the `litestar` skill's guardrails:

- **msgspec DTOs with `Meta(rename="camel")`** for all API schemas
- **`SQLAlchemyAsyncRepositoryService`** for data access
- **`ApplicationError` hierarchy** in `lib/exceptions.py`
- **`@dataclass` + `get_env()` + `@lru_cache`** settings in `lib/settings.py`
- **Guards at Controller class level** for auth
- **`GranianPlugin()`** as the default ASGI server
- **`from __future__ import annotations`** at the top of every module
- Domain-clustered Controllers (`/api/{domain}/`)

## After generating

1. Create each file with real, runnable content (not stubs)
2. Run `make install` to install dependencies

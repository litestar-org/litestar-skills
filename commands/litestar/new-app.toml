1. **Project name** ‚Äî kebab-case slug (e.g., `my-api`)
2. **Frontend approach** ‚Äî one of: none (API-only), HTMX + Jinja, Inertia + React, Inertia + Vue, SPA + React, SPA + Vue, SPA + Svelte
3. **Database** ‚Äî PostgreSQL (default), MySQL, SQLite, Oracle, or none (in-memory only)
4. **Background tasks** ‚Äî include SAQ plugin? (default: yes)

## Generate the project structure

Use the canonical layered architecture from the `litestar` skill:

```
{project_name}/
‚îú‚îÄ‚îÄ src/py/{project_slug}/
‚îÇ   ‚îú‚îÄ‚îÄ __init__.py
‚îÇ   ‚îú‚îÄ‚îÄ server/

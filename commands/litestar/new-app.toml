‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ plugins.py          # GranianPlugin, SAQPlugin, VitePlugin, etc.
‚îÇ   ‚îÇ   ‚îî‚îÄ‚îÄ core.py             # AppSettings, exception handlers
‚îÇ   ‚îú‚îÄ‚îÄ lib/
‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ exceptions.py       # ApplicationError hierarchy
‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ schema.py           # CamelizedBaseStruct base
‚îÇ   ‚îÇ   ‚îú‚îÄ‚îÄ settings.py         # @dataclass + get_env + @lru_cache
‚îÇ   ‚îÇ   ‚îî‚îÄ‚îÄ deps.py             # Shared DI providers
‚îÇ   ‚îú‚îÄ‚îÄ db/

description = "Integrate a Litestar ecosystem library into the current project with opinionated configuration"
prompt = """
# Integrate a Litestar ecosystem library

You are integrating a first-party Litestar ecosystem library into an existing project.

## Available plugins

Present this menu and let the user pick:

1. **litestar-granian** — Replace uvicorn with Granian (Rust ASGI server, HTTP/2)
2. **litestar-saq** — Async task queue (background jobs, cron scheduling, worker lifecycle; Redis or Postgres backend)
3. **litestar-vite** — Frontend build integration (React / Vue / Svelte / HTMX / Inertia / Angular / Astro)
4. **litestar-mcp** — Expose routes as MCP tools/resources over JSON-RPC 2.0
5. **litestar-email** — Email sending (SMTP / SendGrid / Resend / Mailgun / InMemory)
6. **litestar-htmx** — HTMX integration (HTMXRequest, HTMXResponse, hx-ext="litestar" templating)
7. **advanced-alchemy** — SQLAlchemy ORM + Repository Service + OffsetPagination + Alembic
8. **sqlspec** — Low-level SQL adapter + query builder + Arrow integration + framework extensions
9. **pytest-databases** — Container-based database test fixtures
10. **litestar-deployment** — Docker (standard / distroless / worker), Railway, K8s, Cloud Run, systemd

## For each selected plugin

1. **Add the dependency** to `pyproject.toml` (+ `package.json` if frontend)
2. **Register the plugin** in the app's plugins list (`Litestar(plugins=[...])`)
3. **Add configuration** following the canonical pattern from the corresponding skill:
   - Read the skill at `skills/{plugin-name}/SKILL.md` for the Quick Reference code
   - Read `skills/{plugin-name}/references/` for deep configuration options
4. **Add a minimal working example** (one route/handler demonstrating the plugin)
5. **Run `make check`** to verify nothing broke

## Plugin-specific notes

- **litestar-vite**: ask which frontend framework (React / Vue / Svelte / HTMX / Inertia / Angular / Astro); scaffold the corresponding `vite.config.ts` from `skills/litestar-vite/references/modes.md`
- **litestar-saq**: ask for queue backend (Redis or Postgres); configure `QueueConfig` with the chosen DSN; add `use_server_lifespan=True`
- **litestar-mcp**: after adding, show which routes are now MCP-exposed and how to test with `POST /mcp/`
- **advanced-alchemy**: if no models exist yet, scaffold an example domain (model + service + migration)
- **pytest-databases**: add to `[project.optional-dependencies.test]`, create `tests/conftest.py` with the fixture

## After adding

Run `make check` and confirm the plugin loads without errors.
"""

__all__ = ("controllers", "schemas", "services")
```

### `guards.py` (if auth selected)

Generate the appropriate guard function based on the user's auth choice. Use the patterns from `skills/litestar/references/guards.md`.

### `jobs/__init__.py` (if background jobs)

```python

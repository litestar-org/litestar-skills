```

### `channels.py` (if real-time)

```python
\"\"\"WebSocket channel patterns for {name} domain.\"\"\"

{NAME}_CHANNEL = "{name}:{{item_id}}"
```

## After generating

1. **Register the domain's routes** — help the user add the controller to the app's
   `route_handlers` list or Router composition:

   ```python
   from app.domain.{name}.controllers import {Resource}Controller

   app = Litestar(route_handlers=[..., {Resource}Controller])
   ```

2. **Register DI providers** (if applicable) — add the service provider to the app's
   `dependencies` dict (for `provide` DI) or to the Dishka `Provider` (for `dishka` DI).

3. **Create the model / schema pack** — the location depends on data-access:
   - `advanced-alchemy`: add a SQLAlchemy model under `app/db/models/{resource}.py` extending `UUIDAuditBase`:

     ```python
     from advanced_alchemy.base import UUIDAuditBase
     from sqlalchemy.orm import Mapped, mapped_column

     class {Resource}(UUIDAuditBase):
         __tablename__ = "{resources}"
         # TODO: add columns
     ```

   - `sqlspec`: add a schema / TypedDict / msgspec Struct describing the row shape (no ORM model required); add a migration script with the CREATE TABLE.
   - `raw-sqlalchemy`: same as advanced-alchemy but without `UUIDAuditBase` — use `DeclarativeBase` and handle id/created_at/updated_at columns explicitly.

4. **Generate a migration** — tool depends on stack:
   - `advanced-alchemy` / `raw-sqlalchemy`: `alembic revision --autogenerate -m "add {resources} table"`
   - `sqlspec`: use the sqlspec migrations CLI or hand-write the SQL migration.

5. **Register SAQ jobs** (if background tasks) — add the task dotted-path to the SAQ queue config in `server/plugins.py`. Broker DSN was picked at app-scaffold time (Redis or PostgreSQL).

6. **Run `make check`** — verify everything wires up clean.

## Naming conventions

- Directory: `domain/{name}/` (plural, kebab-case → snake_case in Python)
- Controller class: `{Resource}Controller` (singular resource, PascalCase)
- Service class: `{Resource}Service`
- Repository class (advanced-alchemy / raw-sa only): `{Resource}Repository`
- Schema classes: `{Resource}`, `{Resource}Create`, `{Resource}Update`
- Route path: `/api/{name}` (plural)
- Controller file: `_{resource}.py` (underscore-prefixed, singular, snake_case)
"""

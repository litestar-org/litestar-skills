description = "Configure a Litestar project — settings approach, library integration, plugin wiring, environment management"
prompt = """
# Configure a Litestar Project

You are helping the user configure their Litestar application. This covers settings architecture, library integration, and plugin wiring.

## What to configure

Ask the user what they need:

1. **Settings architecture** — how to structure app configuration
2. **Integrate a library** — add an ecosystem library with opinionated config
3. **Environment setup** — .env files, env vars, secrets management

## Option 1: Settings Architecture

Ask which approach the user wants:

### A) `@dataclass` + `get_env()` (canonical — recommended)

This is the pattern used in `litestar-fullstack-spa` and `dma/accelerator`. Type-safe, zero external deps, cached.

```python
from __future__ import annotations

import os
from dataclasses import dataclass, field
from functools import lru_cache
from typing import Any, Callable, TypeVar

T = TypeVar("T")

TRUE_VALUES = frozenset({"True", "true", "1", "yes", "Y", "y", "T", "t"})

def get_env(key: str, default: Any = None) -> Callable:
    \"\"\"Return a field default_factory that reads an env var with type coercion.\"\"\"
    def _factory() -> Any:
        value = os.environ.get(key)
        if value is None:
            return default
        if isinstance(default, bool):
            return value in TRUE_VALUES
        if isinstance(default, int):
            return int(value)
        if isinstance(default, float):
            return float(value)
        return value
    return _factory


@dataclass
class DatabaseSettings:
    URL: str = field(default_factory=get_env("DATABASE_URL", "postgresql+asyncpg://localhost/app"))
    POOL_SIZE: int = field(default_factory=get_env("DATABASE_POOL_SIZE", 10))
    ECHO: bool = field(default_factory=get_env("DATABASE_ECHO", False))


@dataclass
class RedisSettings:
    URL: str = field(default_factory=get_env("REDIS_URL", "redis://localhost:6379/0"))


@dataclass
class AppSettings:
    NAME: str = field(default_factory=get_env("APP_NAME", "My Litestar App"))
    DEBUG: bool = field(default_factory=get_env("APP_DEBUG", False))
    SECRET_KEY: str = field(default_factory=get_env("APP_SECRET_KEY", "change-me-in-production"))
    ALLOWED_CORS_ORIGINS: list[str] = field(default_factory=lambda: ["http://localhost:3000"])
    database: DatabaseSettings = field(default_factory=DatabaseSettings)
    redis: RedisSettings = field(default_factory=RedisSettings)


@lru_cache(maxsize=1)
def get_settings() -> AppSettings:
    return AppSettings()
```

Scaffold this at `lib/settings.py` with the `get_env` utility at `utils/env.py`.

**When `@dataclass` fits:**
- Zero runtime dependency (no `pydantic-settings` install needed) — leaner startup, leaner wheel
- Same `@lru_cache` pattern for singleton settings
- Type coercion via `get_env()` is explicit and debuggable
- Nested dataclasses compose naturally
- `get_env` returns a `Callable` used as `default_factory`, so env vars are read at instantiation time, not import time — important for testing

### B) Pydantic `BaseSettings`

For projects that already depend on Pydantic — shared DTOs with non-Litestar microservices, an existing SQLModel layer, a FastAPI migration, or any codebase where introducing a second validation stack would split the ecosystem:

```python
from __future__ import annotations

from functools import lru_cache

from pydantic_settings import BaseSettings, SettingsConfigDict


class DatabaseSettings(BaseSettings):
    model_config = SettingsConfigDict(env_prefix="DATABASE_")

    url: str = "postgresql+asyncpg://localhost/app"
    pool_size: int = 10
    echo: bool = False


class AppSettings(BaseSettings):
    model_config = SettingsConfigDict(env_prefix="APP_", env_file=".env", extra="ignore")

    name: str = "My Litestar App"
    debug: bool = False
    secret_key: str = "change-me-in-production"
    database: DatabaseSettings = DatabaseSettings()


@lru_cache(maxsize=1)
def get_settings() -> AppSettings:
    return AppSettings()
```

**When `pydantic_settings` fits:** the project already depends on Pydantic (shared DTOs, SQLModel, FastAPI migration, JSON Schema-driven contracts). `BaseSettings` gives automatic `.env` loading, `env_nested_delimiter` for nested models, field-level validation, and CLI / secret-store integration. If you're starting fresh with no existing Pydantic dependency, `@dataclass` + `get_env()` keeps the dependency graph leaner. Both patterns are fully supported — pick based on what's already in your project, not on which is "canonical."

### C) Simple single-file config (tutorials / demos)

For quick starts that don't need the full `get_env()` machinery:

```python
from __future__ import annotations

import os
from dataclasses import dataclass


@dataclass(frozen=True)
class Settings:
    database_url: str = os.environ.get("DATABASE_URL", "sqlite+aiosqlite:///app.db")
    secret_key: str = os.environ.get("SECRET_KEY", "dev-secret")
    debug: bool = os.environ.get("DEBUG", "false").lower() in ("true", "1", "yes")

settings = Settings()  # singleton at module level
```

**Trade-off:** reads env at import time (not test-friendly), no nested config, no type-safe coercion. Fine for demos; refactor to option A for production.

## Option 2: Integrate a Library

Present this menu:

1. **litestar-granian** — Granian ASGI server
2. **litestar-saq** — Async task queue (Redis or Postgres backend)
3. **litestar-vite** — Frontend build (React / Vue / Svelte / HTMX / Inertia / Angular / Astro)
4. **litestar-mcp** — MCP tools/resources over JSON-RPC 2.0
5. **litestar-email** — Email (SMTP / SendGrid / Resend / Mailgun / InMemory)
6. **litestar-htmx** — HTMX integration (HTMXRequest, hx-ext="litestar" templating)
7. **advanced-alchemy** — SQLAlchemy ORM + Repository Service + OffsetPagination + Alembic
8. **sqlspec** — Low-level SQL adapter + query builder + Arrow + framework extensions
9. **pytest-databases** — Container-based database test fixtures
10. **litestar-deployment** — Docker / Railway / K8s / Cloud Run / systemd scaffolding

For each selected library:

1. **Add the dependency** to `pyproject.toml` (+ `package.json` if frontend)
2. **Add a settings section** to the project's settings file (following whichever pattern the project uses — detect from existing code)
3. **Register the plugin** in `Litestar(plugins=[...])`
4. **Add configuration** following the canonical pattern from the skill at `skills/<name>/SKILL.md`
5. **Create a minimal working example** (one route/handler)
6. **Run `make check`**

### Library-specific notes

- **litestar-vite**: ask which frontend framework; scaffold the matching `vite.config.ts` from `skills/litestar-vite/references/modes.md`
- **litestar-saq**: ask for queue backend (Redis or Postgres); configure `QueueConfig` with the chosen DSN; add `use_server_lifespan=True`
- **litestar-mcp**: show which routes are now MCP-exposed and how to test with `POST /mcp/`
- **advanced-alchemy**: if no models exist yet, scaffold an example domain using `/litestar:new-domain`
- **sqlspec**: ask which database adapter (asyncpg, psycopg, oracledb, duckdb, etc.); scaffold the adapter config
- **pytest-databases**: add to `[project.optional-dependencies.test]`, create `tests/conftest.py` with fixtures

## Option 3: Environment Setup

Guide the user through:

1. **`.env` file** — create `.env` with all settings the app expects (from the settings dataclass)
2. **`.env.example`** — create a committed version with placeholder values
3. **Docker env** — create `.env.docker` for docker-compose overrides (service names instead of localhost)
4. **Secrets management** — for production: Google Secret Manager, AWS Secrets Manager, Vault, or Railway/Fly env vars. Show the `ENV_SECRETS` pattern from the canonical apps.
5. **`.gitignore` entry** — ensure `.env` and `.env.local` are ignored

## Option 4: App Architecture Patterns

For users structuring their `server/` module, show these canonical patterns:

### A) `ApplicationCore` Plugin (from `litestar-fullstack-spa`)

The app's core wiring lives in a single `InitPluginProtocol` class. This class:
- Sets `debug`, `openapi_config`, `cors_config`, `session_config`
- Registers all plugins (structlog, granian, alchemy, vite, saq, email, domain)
- Adds exception handlers, signature namespace types, middleware
- Implements `CLIPluginProtocol` to register CLI command groups

```python
from litestar.plugins import CLIPluginProtocol, InitPluginProtocol


class ApplicationCore(InitPluginProtocol, CLIPluginProtocol):
    def on_app_init(self, app_config: AppConfig) -> AppConfig:
        settings = get_settings()
        app_config.debug = settings.app.DEBUG
        app_config.openapi_config = OpenAPIConfig(title=settings.app.NAME, ...)
        app_config.cors_config = config.cors
        app_config.exception_handlers = {ApplicationError: exception_to_http_response}
        app_config.plugins.extend([
            plugins.structlog, plugins.granian, plugins.alchemy,
            plugins.vite, plugins.get_saq_plugin(), plugins.email,
            plugins.domain,
        ])
        return app_config

    def on_cli_init(self, cli: Group) -> None:
        cli.add_command(user_management_group)
```

Then in `asgi.py`: `app = Litestar(plugins=[ApplicationCore()])` — one plugin to rule them all.

**Why:** centralizes all wiring decisions in one auditable place. Plugins, middleware, exception handlers, OpenAPI config, CLI commands — all discoverable from one class.

### B) `DomainPlugin` Auto-Discovery (from `litestar-fullstack-spa`)

Automatically discovers and registers controllers, services, schemas, signals, and repositories from `domain/*/` subpackages — no manual imports needed:

```python
from litestar.plugins import InitPluginProtocol


class DomainPlugin(InitPluginProtocol):
    def on_app_init(self, app_config: AppConfig) -> AppConfig:
        controllers = discover_domain_controllers(["app.domain"])
        schemas = discover_domain_schemas(["app.domain"])
        services = discover_domain_services(["app.domain"])
        signals = discover_domain_signals(["app.domain"])

        app_config.route_handlers.extend(controllers)
        app_config.signature_namespace.update(schemas)
        app_config.signature_namespace.update(services)
        app_config.listeners.extend(signals)
        return app_config
```

**Why:** adding a new domain (via `/litestar:new-domain`) just creates the directory — the `DomainPlugin` picks it up automatically. No need to manually import and register each controller.

**Trade-off:** discovery uses `importlib` to scan packages. Large apps with many domains benefit (20+ controllers). Small apps (2-3 domains) can just list controllers manually.

### C) `plugins.py` Module Pattern

Centralize all plugin instantiation in `server/plugins.py`:

```python
from functools import cache

structlog = StructlogPlugin(config=config.log)
vite = VitePlugin(config=config.vite)
alchemy = SQLAlchemyPlugin(config=config.alchemy)
granian = GranianPlugin()
domain = DomainPlugin()

@cache
def get_saq_plugin() -> SAQPlugin:
    return SAQPlugin(config=config.get_saq_config())
```

**Why `@cache` for SAQ:** SAQ connects to Redis at plugin instantiation. Using `@cache` defers the connection to first access — avoids requiring Redis during `import` (important for Docker builds, tests, CLI commands that don't need SAQ).

## After configuring

Run `make check` to verify the configuration is valid and the app starts.
"""

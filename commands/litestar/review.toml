description = "Review Litestar code against first-party conventions and canonical patterns"
prompt = """
# Litestar Code Review

You are reviewing code in a Litestar project against the canonical patterns documented in the `litestar` skill.

## Scope

Review the files changed in the current branch (or the files the user points at). Focus on:

Apply the project's existing stack to each criterion ‚Äî flag a violation only when code uses a pattern from a *different* stack than the rest of the project, not when it uses a valid alternative.

1. **DTO / serialization correctness** ‚Äî if project is on `msgspec`, are DTOs Structs with `Meta(rename="camel")`? If on Pydantic, do models use `alias_generator=to_camel` + `ConfigDict(populate_by_name=True)`? Flag mixed stacks (msgspec Struct AND `BaseModel` in the same request path).
2. **Guards** ‚Äî auth enforced via Guards at Controller class level? No inline `if not request.user:` checks?
3. **DI** ‚Äî services injected via `Provide()` or Dishka `Inject[T]` per the project's DI choice? Nothing instantiated inside handlers?
4. **Data access** ‚Äî matches the project's stack? `SQLAlchemyAsyncRepositoryService` in an `advanced-alchemy` project, `SQLSpecAsyncService` + driver methods in a `sqlspec` project, or `async_sessionmaker` + hand-rolled statements in a raw-SA project. Flag cross-stack imports (e.g., an `advanced_alchemy` import inside a sqlspec-only repo).
5. **Pagination** ‚Äî matches the project's stack? `OffsetPagination[T]` + `create_filter_dependencies` for `advanced-alchemy`; `LimitOffsetFilter` + `OrderByFilter` for `sqlspec`; `.limit()` / `.offset()` + hand-rolled envelope for raw-SA. Flag hand-rolled `limit` / `offset` query params inside handlers in AA / sqlspec projects.
6. **Exceptions** ‚Äî custom hierarchy extending `ApplicationError`? Registered via `exception_handlers`? No inline try/except in handlers?
7. **Settings** ‚Äî matches the project's stack? `@dataclass(frozen=True)` + `get_env()` + `@lru_cache` if fresh project / no Pydantic; `pydantic_settings.BaseSettings` if Pydantic is already in-stack. Flag mixed (half-dataclass, half-BaseSettings). Flag `msgspec.Struct` used for config.
8. **Async** ‚Äî all I/O handlers are `async def`? No `asyncio.create_task()` for background work (use SAQ)?
9. **Controller structure** ‚Äî domain-clustered (`/api/accounts`, `/api/teams`)? Not HTTP-method-clustered?
10. **Plugin usage** ‚Äî first-party plugins used where available? Check against the project's picked stack: Granian or uvicorn (the one the project chose), SAQ with Redis or Postgres broker (matching the project), litestar-vite if there's a frontend, litestar-mcp, litestar-email, etc.
11. **Return types** ‚Äî all handlers have explicit return type annotations?
12. **`from __future__ import annotations`** ‚Äî present in consumer app modules? Absent from library-introspected modules?
13. **Match-your-stack hygiene** ‚Äî no forced-path language inside the project's own docs / READMEs (e.g., "use X, not Y" where both are valid alternatives). Decision points to check: data access (`advanced-alchemy` / `sqlspec` / raw SA), DI (`Provide` / Dishka), background tasks (SAQ + Redis / SAQ + PostgreSQL), Channels backend (Memory / Redis / PG LISTEN / session-aware), settings (`@dataclass` / `pydantic_settings`), serialization (`msgspec` / Pydantic), ASGI server (Granian / uvicorn), deployment target, caching, migrations, logging. Flag any doc that recommends one path as "canonical" while silently dismissing a valid alternative.

## Process

1. Get the diff: `git diff main...HEAD` (or whatever the user specifies)
2. For each file in the diff, check against the 12 criteria above
3. Report findings as:
   - **Violation**: [criterion] in [file:line] ‚Äî [what's wrong] ‚Äî [fix suggestion]
   - **Good pattern**: [criterion] in [file:line] ‚Äî correctly follows canonical pattern
4. Summarize: violations count, good-pattern count, overall assessment
5. If violations found, offer to fix them (with user approval)

## References

Consult these skills for the canonical patterns:
- `skills/litestar/SKILL.md` ‚Äî guardrails + validation checklist
- `skills/litestar/references/` ‚Äî deep-dive per topic
- `skills/advanced-alchemy/SKILL.md` ‚Äî service + repository patterns
- `skills/msgspec/SKILL.md` ‚Äî DTO patterns
"""
